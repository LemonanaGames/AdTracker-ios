name: AdReport
# Generate the Xcode project on a Mac:  brew install xcodegen && xcodegen generate
# then open AdReport.xcodeproj in Xcode 26. (Widget / Watch targets are added in later phases.)

options:
  bundleIdPrefix: com.millionappz.adreport
  deploymentTarget:
    iOS: "26.0"
  developmentLanguage: en
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    TARGETED_DEVICE_FAMILY: "1"

packages:
  # RevenueCat (paywall / Reporting Pro entitlement). SPM-optimized mirror.
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios-spm.git
    from: "5.0.0"

targets:
  AdReport:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: AdReport
      - path: Shared
      - path: Resources
        excludes:
          - "Info.plist"
    dependencies:
      - target: AdReportWidgets
      - package: RevenueCat
        product: RevenueCat
    entitlements:
      path: AdReport.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.millionappz.adreport
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.millionappz.adreport
        PRODUCT_NAME: AdReport          # executable/bundle name (no space); display name is "Ad Report"
        PRODUCT_MODULE_NAME: AdReport
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    info:
      path: Resources/Info.plist
      properties:
        CFBundleDisplayName: Ad Report
        CFBundleName: AdReport
        CFBundleDevelopmentRegion: en
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
        NSSupportsLiveActivities: true
        BGTaskSchedulerPermittedIdentifiers:
          - com.millionappz.adreport.refresh
        UIBackgroundModes:
          - fetch
          - processing
        CFBundleURLTypes:
          - CFBundleURLName: com.millionappz.adreport.deeplink
            CFBundleURLSchemes:
              - adreport

  AdReportWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: AdReportWidgets
      - path: Shared
        excludes:
          - "Data/AdMobAuth.swift"      # uses UIApplication.shared (banned in extensions)
          - "Data/SyncService.swift"    # app-only (BackgroundTasks); widget reads the cache
    entitlements:
      path: AdReportWidgets/AdReportWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.millionappz.adreport
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.millionappz.adreport.widgets
        PRODUCT_NAME: AdReportWidgets
    info:
      path: AdReportWidgets/Info.plist
      properties:
        CFBundleDisplayName: Ad Report
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  AdReportWatch:
    type: application
    platform: watchOS
    deploymentTarget: "26.0"
    sources:
      - path: AdReportWatch
      - path: Shared
        excludes:
          - "Data/AdMobAuth.swift"
          - "Data/SyncService.swift"
    dependencies:
      - target: AdReportWatchWidgets
    entitlements:
      path: AdReportWatch/AdReportWatch.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.millionappz.adreport
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.millionappz.adreport.watchkitapp
        PRODUCT_NAME: AdReport
    info:
      path: AdReportWatch/Info.plist
      properties:
        CFBundleDisplayName: Ad Report
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.millionappz.adreport

  AdReportWatchWidgets:
    type: app-extension
    platform: watchOS
    deploymentTarget: "26.0"
    sources:
      - path: AdReportWatchWidgets
      - path: Shared
        excludes:
          - "Data/AdMobAuth.swift"
          - "Data/SyncService.swift"
    entitlements:
      path: AdReportWatchWidgets/AdReportWatchWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.millionappz.adreport
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.millionappz.adreport.watchkitapp.widgets
        PRODUCT_NAME: AdReportWatchWidgets
    info:
      path: AdReportWatchWidgets/Info.plist
      properties:
        CFBundleDisplayName: Ad Report
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  AdReportTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: AdReportTests
    dependencies:
      - target: AdReport
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.millionappz.adreport.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  AdReport:
    build:
      targets:
        AdReport: all
        AdReportWidgets: all
        AdReportTests: [test]
    run:
      config: Debug
    test:
      targets:
        - AdReportTests
  AdReportWatch:
    build:
      targets:
        AdReportWatch: all
        AdReportWatchWidgets: all
    run:
      config: Debug
