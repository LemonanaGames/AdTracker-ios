name: iOS CI

# Builds the app + runs the Swift Testing suite on a macOS runner.
# NOTE: the project targets iOS 26 / Swift 6.3, so this requires a runner image
# with Xcode 26 installed. Until GitHub-hosted images ship Xcode 26, pin the
# runner / xcode-version below to an image that has it (or use a self-hosted Mac).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ios-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select newest Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)" && xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve Swift packages
        run: xcodebuild -resolvePackageDependencies -project AdReport.xcodeproj -scheme AdReport

      - name: Build & test (iPhone simulator)
        run: |
          set -o pipefail
          DEST="platform=iOS Simulator,name=iPhone 16 Pro,OS=latest"
          xcodebuild test \
            -project AdReport.xcodeproj \
            -scheme AdReport \
            -destination "$DEST" \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO
