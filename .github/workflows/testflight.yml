name: Deploy to TestFlight

# Manual trigger. Requires these repo secrets (Settings → Secrets and variables → Actions):
#   APPLE_TEAM_ID            e.g. 3TLWCX6V95
#   ASC_KEY_ID               App Store Connect API key id
#   ASC_ISSUER_ID            App Store Connect API issuer id
#   ASC_KEY_P8_BASE64        base64 of the AuthKey_xxx.p8  (base64 -i AuthKey.p8 | pbcopy)
#   DIST_CERT_P12_BASE64     base64 of your Apple Distribution certificate (.p12)
#   DIST_CERT_PASSWORD       password for that .p12
# Prerequisites (one-time): an app record for com.millionappz.adreport in App Store Connect,
# and the App Group "group.com.millionappz.adreport" created + assigned to the app IDs.

on:
  workflow_dispatch:

jobs:
  testflight:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select newest Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)" && xcodebuild -version

      - name: Import signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.DIST_CERT_P12_BASE64 }}
          p12-password: ${{ secrets.DIST_CERT_PASSWORD }}

      - name: Write App Store Connect API key
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "${{ secrets.ASC_KEY_P8_BASE64 }}" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8

      - name: Install XcodeGen & generate project
        run: brew install xcodegen && xcodegen generate

      - name: Archive
        run: |
          set -o pipefail
          xcodebuild archive \
            -project AdReport.xcodeproj \
            -scheme AdReport \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/AdReport.xcarchive" \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.ASC_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.ASC_ISSUER_ID }} \
            DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }} \
            CURRENT_PROJECT_VERSION=${{ github.run_number }}

      - name: Export .ipa
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>app-store-connect</string>
            <key>teamID</key><string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>signingStyle</key><string>automatic</string>
            <key>uploadSymbols</key><true/>
            <key>destination</key><string>export</string>
          </dict></plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/AdReport.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.ASC_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.ASC_ISSUER_ID }}

      - name: Upload to TestFlight
        run: |
          xcrun altool --upload-app -t ios \
            -f "$RUNNER_TEMP"/export/*.ipa \
            --apiKey ${{ secrets.ASC_KEY_ID }} \
            --apiIssuer ${{ secrets.ASC_ISSUER_ID }}
